# Website: http://YOUR_SERVER:8095
# API:     http://YOUR_SERVER:8095/api/

services:
  backend:
    image: pakistan-chatbot-backend:v2
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pakistan-chatbot-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=*
      - GROK_MODEL=grok-4-1-fast-reasoning
    volumes:
      - ./backend/data:/app/data
      - ./combined_incidents.csv:/app/combined_incidents.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  frontend:
    image: pakistan-chatbot-frontend:v2
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pakistan-chatbot-frontend
    restart: always
    ports:
      - "8095:80"
    depends_on:
      backend:
        condition: service_healthy
